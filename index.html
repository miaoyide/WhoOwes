<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhoOwes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div id="homePage" class="container">
        <header>
            <h1>WhoOwesYou</h1>
            <p>選擇一個行程開始記帳</p>
        </header>

        <div id="eventGrid" class="event-grid">
            <div class="loading">載入行程中...</div>
        </div>

        <button class="add-event-main-btn" onclick="promptNewEvent()">
            <span>+</span> 建立新行程
        </button>
    </div>

    <div id="detailPage" style="display: none;">
        <div class="container">
                <!-- <button onclick="showPage('home')" class="back-btn">首頁</button> -->
            <div class="event-header">
                <label for="eventSelect">當前行程：</label>
                <select id="eventSelect" onchange="changeEvent(this.value)">
                    <option value="">讀取中...</option>
                </select>
            </div>
            <div class="input-group">
                <div class="input-row"><label>消費日期</label><input type="date" id="itemDate" onclick="this.showPicker()">
                </div>
                <div class="input-row"><label>付款人</label><select id="itemPayerSelect"></select></div>
                <div class="input-row"><label>項目 / 金額</label>
                    <div style="display:flex; gap:8px;"><input type="text" id="itemDesc" placeholder="項目"
                            style="flex:2;"><input type="number" id="itemAmount" placeholder="$" style="flex:1;"></div>
                </div>
                <div class="input-row">
                    <label>分攤成員（默認全選）</label>
                    <div id="memberSelector" class="member-checkbox-group"></div>
                    <div class="member-input-group">
                        <input type="text" id="newMemberName" placeholder="輸入新成員名字...">
                        <button onclick="addNewMember()" class="add-btn">新增</button>
                    </div>
                </div>
                <button id="submitBtn" onclick="addExpense()">新增一筆消費</button>
            </div>

            <div class="summary-card">
                <div id="settlementReport"></div>
            </div>
            <div id="expenseList"></div>
            <div class="clear-all" onclick="clearData()">清空所有雲端記錄</div>
        </div>
    </div>

    <footer class="copyright clear-all">
        &copy; 2026 SG. All Rights Reserved.
    </footer>
    

    <script src="script.js"></script>
</body>

</html>

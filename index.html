<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhoOwes</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* 延用之前的 CSS 樣式，這裡省略以節省空間，請保留你原本的 Style 區塊 */
        :root {
            --primary: #1a73e8;
            --bg: #f8f9fa;
            --text: #202124;
            --secondary: #5f6368;
            --success: #34a853;
            --danger: #ea4335;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            padding: 20px;
            color: var(--text);
        }

        .container {
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 20px;
            font-weight: 800;
        }

        .input-group {
            background: #f1f3f4;
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .input-row {
            margin-bottom: 12px;
        }

        label {
            font-size: 13px;
            color: var(--secondary);
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .member-checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
        }

        .member-chip {
            background: #fff;
            border: 1px solid #ddd;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
        }

        .member-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
        }

        .summary-card {
            background: #e8f0fe;
            padding: 20px;
            border-radius: 16px;
            margin: 20px 0;
        }

        .report-item {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 6px 0;
        }

        .status-plus {
            color: var(--success);
            font-weight: bold;
        }

        .status-minus {
            color: var(--danger);
            font-weight: bold;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 5px;
            border-bottom: 1px solid #f1f3f4;
        }

        .item-sub {
            font-size: 11px;
            color: var(--secondary);
            margin-top: 4px;
        }

        .delete-btn {
            color: #ccc;
            cursor: pointer;
            margin-left: 10px;
        }

        .clear-all { 
            text-align: center; 
            margin-top: 30px; 
            font-size: 12px; 
            color: #bdc1c6; 
            cursor: pointer; 
            text-decoration: underline; 
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>WhoOwes ☁️</h2>
        <div class="input-group">
            <div class="input-row"><label>日期</label><input type="date" id="itemDate" onclick="this.showPicker()"></div>
            <div class="input-row"><label>付款人</label><select id="itemPayerSelect"></select></div>
            <div class="input-row"><label>項目 / 金額</label>
                <div style="display:flex; gap:8px;"><input type="text" id="itemDesc" placeholder="項目"
                        style="flex:2;"><input type="number" id="itemAmount" placeholder="$" style="flex:1;"></div>
            </div>
            <div class="input-row">
                <label>分攤成員</label>
                <div id="memberSelector" class="member-checkbox-group"></div>
                <input type="text" id="newMember" placeholder="+ 新增成員名字"
                    style="margin-top:10px; font-size:12px; border-style:dashed;" onkeypress="handleMemberKey(event)">
            </div>
            <button id="submitBtn" onclick="addExpense()">同步記一筆</button>
        </div>

        <div class="summary-card">
            <div id="settlementReport"></div>
        </div>
        <div id="expenseList"></div>
        <div class="clear-all" onclick="clearData()">清空所有雲端記錄</div>
    </div>

    <script>
        // --- 請替換以下資訊 ---
        const SUPABASE_URL = 'https://naagujwufjeqsgwmyrcv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hYWd1and1ZmplcXNnd215cmN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMjc0MTcsImV4cCI6MjA4ODkwMzQxN30.6MFjNVe2zz1lwGVYx9BSFco7hEZTjvBueGQABrq1apM';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let expenses = [];
        let members = JSON.parse(localStorage.getItem('whoowes_members')) || ['ㄉ', 'ㄐㄅ'];
        let selectedParticipants = [...members];

        window.onload = async function () {
            document.getElementById('itemDate').value = new Date().toISOString().split('T')[0];
            await fetchExpenses(); // 初始載入雲端資料

            // 開啟即時監聽：一旦雲端資料變動，立刻更新畫面
            _supabase.channel('custom-all-channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'expenses' }, payload => {
                    fetchExpenses();
                }).subscribe();

            render();
        };

        async function fetchExpenses() {
            const { data, error } = await _supabase.from('expenses').select('*').order('date', { ascending: false });
            if (!error) {
                expenses = data;
                render();
            }
        }

        async function addExpense() {
            const btn = document.getElementById('submitBtn');
            const payer = document.getElementById('itemPayerSelect').value;
            const desc = document.getElementById('itemDesc').value.trim();
            const amount = parseFloat(document.getElementById('itemAmount').value);
            const date = document.getElementById('itemDate').value;

            if (!desc || isNaN(amount)) return alert("填寫不完整");

            btn.disabled = true;
            btn.innerText = "同步中...";

            // 寫入 Supabase 雲端
            const { error } = await _supabase.from('expenses').insert([{
                date, payer, description: desc, amount, participants: selectedParticipants
            }]);

            if (error) alert("同步失敗：" + error.message);

            btn.disabled = false;
            btn.innerText = "同步記一筆";
            document.getElementById('itemDesc').value = '';
            document.getElementById('itemAmount').value = '';
        }

        async function deleteItem(id, desc) {
            if (!confirm(`確定刪除「${desc}」？`)) return;
            await _supabase.from('expenses').delete().eq('id', id);
        }

        // (其餘成員管理、計算與 render 邏輯與之前相同，但計算時使用雲端的 expenses 陣列)
        // 為節省長度，此處 render 邏輯需對應 table 欄位名 (description, participants)
        function render() {
            // 更新成員選擇與下拉清單
            const selector = document.getElementById('memberSelector');
            selector.innerHTML = members.map(m => `<div class="member-chip ${selectedParticipants.includes(m) ? 'active' : ''}" onclick="toggleParticipant('${m}')">${m}</div>`).join('');

            const payerSelect = document.getElementById('itemPayerSelect');
            const prev = payerSelect.value;
            payerSelect.innerHTML = members.map(m => `<option value="${m}" ${m === prev ? 'selected' : ''}>${m}</option>`).join('');

            const list = document.getElementById('expenseList');
            const settlementDiv = document.getElementById('settlementReport');
            list.innerHTML = ''; settlementDiv.innerHTML = '';

            let balances = {};
            members.forEach(m => balances[m] = 0);

            expenses.forEach(item => {
                if (balances[item.payer] !== undefined) balances[item.payer] += parseFloat(item.amount);
                const perPerson = item.amount / item.participants.length;
                item.participants.forEach(p => {
                    if (balances[p] !== undefined) balances[p] -= perPerson;
                });

                list.innerHTML += `<div class="list-item">
                <div class="item-info">
                    <div class="item-desc">${item.description}</div>
                    <div class="item-sub">${item.date} · <b>${item.payer}</b> 付 · 分攤: ${item.participants.join(', ')}</div>
                </div>
                <div class="item-price">$${Math.round(item.amount)}<span class="delete-btn" onclick="deleteItem(${item.id}, '${item.description}')">×</span></div>
            </div>`;
            });

            for (let name in balances) {
                const bal = Math.round(balances[name]);
                if (Math.abs(bal) < 1) continue;
                settlementDiv.innerHTML += `<div class="report-item"><span>${name}</span><span class="${bal > 0 ? 'status-plus' : 'status-minus'}">${bal > 0 ? '應收' : '應付'} $${Math.abs(bal)}</span></div>`;
            }
        }

        function toggleParticipant(name) {
            selectedParticipants = selectedParticipants.includes(name) ? selectedParticipants.filter(m => m !== name) : [...selectedParticipants, name];
            render();
        }
        function handleMemberKey(e) {
            if (e.key === 'Enter') {
                const name = e.target.value.trim();
                if (name && !members.includes(name)) {
                    members.push(name);
                    selectedParticipants.push(name);
                    localStorage.setItem('whoowes_members', JSON.stringify(members));
                    e.target.value = '';
                    render();
                }
            }
        }

        async function clearData() {
            if (confirm("⚠️ 警告：這會刪除「雲端資料庫」中所有的帳目，且無法復原！確定要清空嗎？")) {
                // 刪除 expenses 表格中所有 id 大於 0 的資料 (即所有資料)
                const { error } = await _supabase
                    .from('expenses')
                    .delete()
                    .gt('id', 0);

                if (error) {
                    alert("清空失敗：" + error.message);
                } else {
                    // 清空本地快取成員，讓它恢復你設定的預設值
                    localStorage.removeItem('whoowes_members');
                    alert("雲端資料已清空！頁面將自動重新整理。");
                    location.reload();
                }
            }
        }

    </script>
</body>

</html>

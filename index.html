<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhoOwes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div id="loadingOverlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <div id="homePage" class="container">
        <header>
            <h1 onclick="handleTitleClick()">WhoOwesYou</h1>
            <p>錢的事，找ㄩㄩ</p>
        </header>

        <div id="eventGrid" class="event-grid">
            <div class="loading">載入行程中...</div>
        </div>

        <button class="add-event-main-btn" onclick="promptNewEvent()">
            <span>+</span> 建立新行程
        </button>
    </div>

    <div id="detailPage">
        <div class="container">
            <div class="event-header">
                <button onclick="showPage('home')" class="back-btn">← 首頁</button>
                <select id="eventSelect" onchange="changeEvent(this.value)">
                    <option value="">讀取中...</option>
                </select>
            </div>
            <div class="input-group">
                <div class="input-row">
                    <label>消費日期</label>
                    <input type="date" id="itemDate" onclick="this.showPicker()">
                </div>
                <div class="input-row">
                    <label>項目 / 金額</label>
                    <div class="amount-row">
                        <input type="text" id="itemDesc" placeholder="項目" class="flex-2">
                        <input type="number" id="itemAmount" placeholder="$" class="flex-1">
                    </div>
                </div>
                <div class="input-row">
                    <label id="payerLabel">付款人</label>
                    <div id="payerSelector" class="member-checkbox-group"></div>
                </div>
                <div class="input-row">
                    <label id="participantLabel">分攤成員（已選 0 人）</label>
                    <div id="memberSelector" class="member-checkbox-group"></div>
                </div>
                <button id="submitBtn" onclick="addExpense()">新增一筆消費</button>
            </div>
            <div class="summary-card">
                <div class="tab-bar">
                    <button class="tab-btn active" onclick="switchTab('detail', event)">收支明細</button>
                    <button class="tab-btn" onclick="switchTab('settlement', event)">結清建議</button>
                </div>
                <div id="settlementReport"></div>
                <div id="detailReport"></div>
            </div>
            <div id="expenseList"></div>
            <div class="clear-all" onclick="clearData()">刪除行程</div>
        </div>
    </div>

    <footer class="copyright">
        &copy; 2026 SG. All Rights Reserved.
    </footer>

    <div id="editEventModal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <h3>編輯行程</h3>
            <div class="input-row">
                <label>行程名稱</label>
                <input type="text" id="editEventName" placeholder="行程名稱">
            </div>
            <div class="input-row">
                <label>成員</label>
                <div id="editMemberChips" class="member-checkbox-group"></div>
            </div>
            <div class="input-row">
                <div class="member-input-group">
                    <input type="text" id="editNewMember" placeholder="新增成員...">
                    <button onclick="addEditMember()" class="add-btn">新增</button>
                </div>
            </div>
            <div class="modal-actions">
                <button onclick="closeEditEventModal()" class="btn-cancel">取消</button>
                <button onclick="confirmEditEvent()" class="btn-confirm">儲存</button>
            </div>
        </div>
    </div>

    <div id="newEventModal" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <h3>建立新行程</h3>
            <div class="input-row">
                <label>行程名稱</label>
                <input type="text" id="newEventName" placeholder="例：西班牙20天21夜">
            </div>
            <div class="input-row">
                <label>選擇成員</label>
                <div id="modalMemberChips" class="member-checkbox-group"></div>
            </div>
            <div class="input-row">
                <div class="member-input-group">
                    <input type="text" id="modalNewMember" placeholder="新增其他成員...">
                    <button onclick="addModalMember()" class="add-btn">新增</button>
                </div>
            </div>
            <div class="modal-actions">
                <button onclick="closeNewEventModal()" class="btn-cancel">取消</button>
                <button onclick="confirmNewEvent()" class="btn-confirm">建立行程</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>

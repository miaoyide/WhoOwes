<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhoOwes - 防呆強化版</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --text: #202124; --secondary: #5f6368; --success: #34a853; --danger: #ea4335; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; color: var(--text); }
        .container { background: white; width: 100%; max-width: 450px; padding: 25px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 20px; font-weight: 800; }
        
        .input-group { background: #f1f3f4; padding: 20px; border-radius: 16px; margin-bottom: 20px; }
        .input-row { margin-bottom: 15px; }
        label { font-size: 13px; color: var(--secondary); font-weight: bold; margin-bottom: 5px; display: block; }
        
        input[type="date"], input[type="text"], input[type="number"], select { 
            width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; 
            box-sizing: border-box; font-size: 16px; background: white; appearance: none;
        }

        .member-checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .member-chip { background: #fff; border: 1px solid #ddd; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 13px; }
        .member-chip.active { background: var(--primary); color: white; border-color: var(--primary); }

        button { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }

        .summary-card { background: #e8f0fe; padding: 18px; border-radius: 16px; margin: 20px 0; }
        .report-item { display: flex; justify-content: space-between; font-size: 14px; padding: 4px 0; }
        .status-plus { color: var(--success); font-weight: bold; }
        .status-minus { color: var(--danger); font-weight: bold; }

        .list-header { font-size: 14px; font-weight: bold; margin: 20px 0 10px 0; display: flex; justify-content: space-between; }
        #expenseList { max-height: 400px; overflow-y: auto; }
        .list-item { display: flex; justify-content: space-between; padding: 12px 5px; border-bottom: 1px solid #f1f3f4; align-items: center; }
        .item-info { flex-grow: 1; }
        .item-desc { font-weight: 600; font-size: 15px; }
        .item-sub { font-size: 11px; color: var(--secondary); margin-top: 4px; }
        
        /* 優化刪除按鈕：增加點擊區域面積 */
        .delete-btn { 
            color: #ccc; cursor: pointer; padding: 10px 5px 10px 15px; 
            font-size: 20px; transition: color 0.2s; 
        }
        .delete-btn:hover { color: var(--danger); }

        .clear-all { text-align: center; margin-top: 40px; font-size: 12px; color: #bdc1c6; cursor: pointer; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>WhoOwes 💸</h2>
    
    <div class="input-group">
        <div class="input-row">
            <label>日期</label>
            <input type="date" id="itemDate" onclick="this.showPicker()">
        </div>
        <div class="input-row">
            <label>付款人</label>
            <select id="itemPayerSelect"></select>
        </div>
        <div class="input-row">
            <label>項目 / 金額</label>
            <div style="display: flex; gap: 8px;">
                <input type="text" id="itemDesc" placeholder="項目" style="flex: 2;">
                <input type="number" id="itemAmount" placeholder="$" style="flex: 1;" inputmode="decimal">
            </div>
        </div>
        <div class="input-row">
            <label>分攤成員 (點擊勾選參與者)</label>
            <div id="memberSelector" class="member-checkbox-group"></div>
            <input type="text" id="newMember" placeholder="+ 輸入新成員姓名後按 Enter" style="margin-top:12px; font-size: 12px; border-style: dashed;" onkeypress="handleMemberKey(event)">
        </div>
        <button onclick="addExpense()">記一筆</button>
    </div>

    <div class="summary-card">
        <div style="font-size: 14px; font-weight: bold; text-align: center; margin-bottom: 10px; color: var(--primary);">📊 結算報告</div>
        <div id="settlementReport"></div>
    </div>

    <div class="list-header">
        <span>帳目明細</span>
        <span id="itemCount" style="color: var(--primary); font-weight: normal;">0 筆</span>
    </div>
    <div id="expenseList"></div>

    <div class="clear-all" onclick="clearData()">清空所有記錄</div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('whoowes_final')) || { 
        expenses: [], 
        members: ['我', '朋友A', '朋友B'] 
    };
    let selectedParticipants = [...data.members];

    window.onload = function() {
        document.getElementById('itemDate').value = new Date().toISOString().split('T')[0];
        render();
    };

    function handleMemberKey(e) {
        if (e.key === 'Enter') {
            const name = e.target.value.trim();
            if (name && !data.members.includes(name)) {
                data.members.push(name);
                selectedParticipants.push(name);
                e.target.value = '';
                saveAndRender();
            }
        }
    }

    function toggleParticipant(name) {
        if (selectedParticipants.includes(name)) {
            selectedParticipants = selectedParticipants.filter(m => m !== name);
        } else {
            selectedParticipants.push(name);
        }
        renderSelector();
    }

    function addExpense() {
        const date = document.getElementById('itemDate').value;
        const payer = document.getElementById('itemPayerSelect').value;
        const desc = document.getElementById('itemDesc').value.trim();
        const amount = parseFloat(document.getElementById('itemAmount').value);

        if (!payer || !desc || isNaN(amount) || selectedParticipants.length === 0) {
            alert("資訊填寫不完整，或未選擇分攤成員！"); return;
        }

        data.expenses.push({
            id: Date.now(),
            date, payer, desc, amount,
            participants: [...selectedParticipants]
        });
        
        data.expenses.sort((a, b) => new Date(b.date) - new Date(a.date));
        saveAndRender();
        document.getElementById('itemDesc').value = '';
        document.getElementById('itemAmount').value = '';
    }

    function saveAndRender() {
        localStorage.setItem('whoowes_final', JSON.stringify(data));
        render();
    }

    // 單筆刪除防呆
    function deleteItem(id, desc) {
        if (confirm(`確定要刪除「${desc}」這筆帳目嗎？`)) {
            data.expenses = data.expenses.filter(i => i.id !== id);
            saveAndRender();
        }
    }

    function clearData() { 
        if(confirm("警告：這將會刪除所有成員與帳目記錄！確定要清空嗎？")) { 
            data.expenses = []; 
            saveAndRender(); 
        } 
    }

    function renderSelector() {
        const selector = document.getElementById('memberSelector');
        selector.innerHTML = data.members.map(m => `
            <div class="member-chip ${selectedParticipants.includes(m) ? 'active' : ''}" onclick="toggleParticipant('${m}')">${m}</div>
        `).join('');
    }

    function render() {
        renderSelector();
        
        // 更新付款人下拉選單
        const payerSelect = document.getElementById('itemPayerSelect');
        const prevPayer = payerSelect.value;
        payerSelect.innerHTML = data.members.map(m => `
            <option value="${m}" ${m === prevPayer ? 'selected' : ''}>${m}</option>
        `).join('');

        const list = document.getElementById('expenseList');
        const settlementDiv = document.getElementById('settlementReport');
        const itemCountSpan = document.getElementById('itemCount');
        
        list.innerHTML = ''; settlementDiv.innerHTML = '';
        let balances = {};
        data.members.forEach(m => balances[m] = 0);

        data.expenses.forEach(item => {
            // 墊付者加回金額
            if (balances[item.payer] !== undefined) balances[item.payer] += item.amount;
            
            // 參與者扣除應付份額
            const perPerson = item.amount / item.participants.length;
            item.participants.forEach(p => {
                if (balances[p] !== undefined) balances[p] -= perPerson;
            });

            list.innerHTML += `
                <div class="list-item">
                    <div class="item-info">
                        <div class="item-desc">${item.desc}</div>
                        <div class="item-sub">${item.date} · <b>${item.payer}</b> 付款 · 分攤: ${item.participants.join(', ')}</div>
                    </div>
                    <div class="item-price">
                        $${Math.round(item.amount).toLocaleString()}
                        <span class="delete-btn" onclick="deleteItem(${item.id}, '${item.desc}')">×</span>
                    </div>
                </div>`;
        });

        // 結算邏輯
        let hasBalances = false;
        for (let name in balances) {
            const bal = Math.round(balances[name]);
            if (Math.abs(bal) < 1) continue; // 忽略極小誤差
            hasBalances = true;
            const statusClass = bal > 0 ? 'status-plus' : 'status-minus';
            settlementDiv.innerHTML += `
                <div class="report-item">
                    <span>${name}</span>
                    <span class="${statusClass}">${bal > 0 ? '應收' : '應付'} $${Math.abs(bal).toLocaleString()}</span>
                </div>`;
        }
        
        if (!hasBalances) {
            settlementDiv.innerHTML = '<div style="text-align:center; color:#999; font-size:13px; padding:10px;">目前帳目平衡，無人欠款</div>';
        }
        itemCountSpan.innerText = `${data.expenses.length} 筆`;
    }
</script>
</body>
</html>
